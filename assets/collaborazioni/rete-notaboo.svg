<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" width="720" height="720" role="img" aria-label="Illustrazione astratta di una rete di persone connesse, in stile pop art">
  <defs>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect width="18" height="18" fill="#e74c47"/>
      <circle cx="4" cy="4" r="2.4" fill="#f6f2ec"/>
      <circle cx="13" cy="13" r="2.4" fill="#f6f2ec"/>
    </pattern>
    <pattern id="chevrons" width="26" height="14" patternUnits="userSpaceOnUse" patternTransform="translate(0 0)">
      <rect width="26" height="14" fill="#f6f2ec"/>
      <path d="M0 14 L6.5 0 L13 14 L19.5 0 L26 14" fill="none" stroke="#0d0d0d" stroke-width="2.4"/>
    </pattern>
    <pattern id="cross" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="16" height="16" fill="#9c72bd"/>
      <line x1="0" y1="8" x2="16" y2="8" stroke="#f6f2ec" stroke-width="1.6"/>
    </pattern>
  </defs>

  <rect width="720" height="720" fill="#0d0d0d"/>

  <!-- scattered confetti accents -->
  <g stroke="#f6f2ec" stroke-width="2.4" stroke-linecap="round" opacity=".8">
    <path d="M64 96 L76 108 M76 96 L64 108"/>
    <path d="M646 128 L658 140 M658 128 L646 140"/>
    <path d="M52 610 L64 622 M64 610 L52 622"/>
  </g>
  <circle cx="668" cy="360" r="5" fill="#e6ff48"/>
  <circle cx="46" cy="360" r="5" fill="#e6ff48"/>
  <path d="M598 600 C 606 588 622 588 626 600 C 630 612 614 622 606 630 C 598 622 590 612 598 600 Z" fill="#e74c47"/>

  <!-- network edges (drawn first, beneath nodes) -->
  <g stroke="#f6f2ec" stroke-width="2.5" opacity=".55">
    <line x1="360" y1="200" x2="180" y2="300"/>
    <line x1="360" y1="200" x2="540" y2="300"/>
    <line x1="360" y1="200" x2="360" y2="380"/>
    <line x1="360" y1="380" x2="240" y2="470"/>
    <line x1="360" y1="380" x2="480" y2="480"/>
    <line x1="180" y1="300" x2="240" y2="470"/>
    <line x1="540" y1="300" x2="480" y2="480"/>
    <line x1="240" y1="470" x2="360" y2="560"/>
    <line x1="480" y1="480" x2="360" y2="560"/>
    <line x1="180" y1="300" x2="120" y2="480"/>
    <line x1="540" y1="300" x2="600" y2="460"/>
  </g>

  <!-- small nodes -->
  <circle cx="120" cy="480" r="40" fill="#ffc9cf"/>
  <circle cx="600" cy="460" r="42" fill="#9c72bd"/>
  <circle cx="360" cy="560" r="48" fill="#e6ff48"/>

  <!-- patterned nodes -->
  <circle cx="180" cy="300" r="70" fill="url(#dots)"/>
  <circle cx="240" cy="470" r="62" fill="url(#chevrons)"/>
  <circle cx="600" cy="460" r="0" fill="none"/>
  <circle cx="480" cy="480" r="76" fill="url(#cross)"/>

  <!-- center connector node -->
  <circle cx="360" cy="380" r="52" fill="#ffc9cf"/>
  <path d="M338 380 a22 22 0 1 1 44 0 a22 22 0 1 1 -44 0" fill="none" stroke="#0d0d0d" stroke-width="3"/>
  <circle cx="360" cy="380" r="7" fill="#e74c47"/>

  <!-- plain node -->
  <circle cx="540" cy="300" r="66" fill="#f6f2ec"/>

  <!-- main face-node with eye (largest, top) -->
  <circle cx="360" cy="200" r="96" fill="#e74c47"/>
  <g transform="translate(360 198)">
    <ellipse cx="0" cy="0" rx="52" ry="34" fill="#f6f2ec" stroke="#0d0d0d" stroke-width="4"/>
    <circle cx="0" cy="0" r="19" fill="#9c72bd"/>
    <circle cx="0" cy="0" r="9" fill="#0d0d0d"/>
    <circle cx="5" cy="-5" r="3.2" fill="#f6f2ec"/>
    <path d="M-46 -20 L-30 -30 M-18 -32 L-2 -38 M14 -36 L30 -28 M42 -18 L52 -6" stroke="#0d0d0d" stroke-width="3.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- secondary face-node with eye -->
  <g transform="translate(480 480)">
    <ellipse cx="0" cy="4" rx="34" ry="24" fill="#f6f2ec" stroke="#0d0d0d" stroke-width="3.4"/>
    <circle cx="0" cy="4" r="13" fill="#e74c47"/>
    <circle cx="0" cy="4" r="6" fill="#0d0d0d"/>
    <circle cx="3.4" cy="0.6" r="2.2" fill="#f6f2ec"/>
  </g>

  <!-- small hand / connection gesture accents -->
  <g fill="#0d0d0d">
    <circle cx="120" cy="480" r="4.5"/>
    <circle cx="132" cy="492" r="4.5"/>
    <circle cx="108" cy="492" r="4.5"/>
  </g>

  <!-- outer ring hinting at continuing network -->
  <circle cx="360" cy="360" r="286" fill="none" stroke="#f6f2ec" stroke-width="1.4" stroke-dasharray="2 10" opacity=".5"/>
</svg>
